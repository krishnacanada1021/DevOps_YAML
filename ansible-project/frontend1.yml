- name: Frontend App Deployment
  hosts: all
  become: yes
  vars:
    app_loc: /usr/share/nginx/html
    component: frontend
  tasks:
    - name: Install Nginx
      ansible.builtin.apt:
        name: nginx
        state: latest
        update_cache: yes

    - name: Copy Expense Nginx Configuration
      ansible.builtin.copy:
        src: expense.conf
        dest: /etc/nginx/conf.d/expense.conf

    - name: Clear old content
      ansible.builtin.file:
        path: /usr/share/nginx/html
        state: absent

    - name: Create App Directory
      ansible.builtin.file:
        path: "{{ app_loc }}"
        state: directory

    - name: Download and Extract App Content
      ansible.builtin.unarchive:
        src: "https://expense-artifacts.s3.amazonaws.com/expense-{{ component }}-v2.zip"
        dest: "{{ app_loc }}"
        remote_src: yes

    - name: Restart and Enable Nginx Service
      ansible.builtin.systemd:
        name: nginx
        state: restarted
        enabled: yes